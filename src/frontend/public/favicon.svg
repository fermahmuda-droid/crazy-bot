<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="#0a0e1a"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" stroke="#1270D4" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="14" stroke="#1270D4" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Rotating arcs — Claude/Gemini style -->
  <path d="M32 10 A22 22 0 0 1 54 32" stroke="#1270D4" stroke-width="3" stroke-linecap="round"/>
  <path d="M54 32 A22 22 0 0 1 32 54" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M32 54 A22 22 0 0 1 10 32" stroke="#1270D4" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M10 32 A22 22 0 0 1 32 10" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Center core -->
  <circle cx="32" cy="32" r="6" fill="white"/>
  <!-- Accent dot top -->
  <circle cx="32" cy="10" r="2.5" fill="#1270D4"/>
  <!-- Accent dot right -->
  <circle cx="54" cy="32" r="2.5" fill="white"/>
  <!-- Accent dot bottom -->
  <circle cx="32" cy="54" r="2" fill="#1270D4" opacity="0.7"/>
  <!-- Small inner highlight -->
  <circle cx="32" cy="32" r="3" fill="#1270D4"/>
</svg>
